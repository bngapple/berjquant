name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:  # allow manual trigger from GitHub Actions UI

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Build React dashboard
        working-directory: dashboard
        run: npm ci && npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller HTFExecutor_windows.spec --clean --noconfirm

      - name: Zip output
        run: Compress-Archive -Path dist\HTFExecutor\* -DestinationPath dist\HTFExecutor_windows.zip
        shell: powershell

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: HTFExecutor-windows
          path: dist/HTFExecutor_windows.zip
          retention-days: 30

      # On tagged releases (v1.0.0 etc), attach to GitHub Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HTFExecutor_windows.zip
