# Economic Event Blackout Calendar
# No new entries within blackout_buffer_minutes before/after events

blackout_buffer_minutes: 5

# Recurring event patterns (for auto-generating dates)
recurring_events:
  - type: "NFP"
    description: "Non-Farm Payrolls"
    schedule: "first_friday"
    time: "08:30"
    timezone: "US/Eastern"

  - type: "CPI"
    description: "Consumer Price Index"
    schedule: "monthly"
    time: "08:30"
    timezone: "US/Eastern"

  - type: "PPI"
    description: "Producer Price Index"
    schedule: "monthly"
    time: "08:30"
    timezone: "US/Eastern"

