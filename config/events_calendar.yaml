# Economic Event Blackout Calendar
# No new entries within blackout_buffer_minutes before/after events
# Fix #7: Increased buffer from 5 to 15 min; added recurring event generation

blackout_buffer_minutes: 15

# Recurring event patterns (parsed by risk manager to generate actual dates)
recurring_events:
  - type: "NFP"
    description: "Non-Farm Payrolls"
    schedule: "first_friday"
    time: "08:30"
    timezone: "US/Eastern"

  - type: "CPI"
    description: "Consumer Price Index"
    schedule: "monthly_mid"
    time: "08:30"
    timezone: "US/Eastern"

  - type: "PPI"
    description: "Producer Price Index"
    schedule: "monthly_mid"
    time: "08:30"
    timezone: "US/Eastern"

  - type: "ISM_MFG"
    description: "ISM Manufacturing PMI"
    schedule: "first_business_day"
    time: "10:00"
    timezone: "US/Eastern"

  - type: "RETAIL_SALES"
    description: "Retail Sales"
    schedule: "monthly_mid"
    time: "08:30"
    timezone: "US/Eastern"

  - type: "GDP"
    description: "GDP (Advance/Prelim/Final)"
    schedule: "quarterly"
    time: "08:30"
    timezone: "US/Eastern"

  - type: "JOBLESS_CLAIMS"
    description: "Initial Jobless Claims"
    schedule: "weekly_thursday"
    time: "08:30"
    timezone: "US/Eastern"

