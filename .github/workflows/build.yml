name: Build Releases

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

defaults:
  run:
    working-directory: tradovate-executor

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tradovate-executor/dashboard/package-lock.json

      - name: Install Python dependencies
        run: pip install -r requirements.txt pywebview pyinstaller

      - name: Build dashboard
        run: cd dashboard && npm ci && npm run build

      - name: Build Windows app
        run: pyinstaller HTFExecutor_windows.spec --clean --noconfirm

      - name: Package Windows zip
        run: Compress-Archive -Path dist\HTFExecutor\* -DestinationPath dist\HTFExecutor_windows.zip
        shell: powershell

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: HTFExecutor-Windows
          path: tradovate-executor/dist/HTFExecutor_windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tradovate-executor/dashboard/package-lock.json

      - name: Install Python dependencies
        run: pip install -r requirements.txt pywebview pyinstaller

      - name: Build dashboard
        run: cd dashboard && npm ci && npm run build

      - name: Build .app bundle
        run: pyinstaller HTFExecutor.spec --clean --noconfirm

      - name: Package as DMG
        run: |
          hdiutil create -volname "HTFExecutor" \
            -srcfolder "dist/HTFExecutor.app" \
            -ov -format UDZO \
            "dist/HTFExecutor-macOS.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: HTFExecutor-macOS
          path: tradovate-executor/dist/HTFExecutor-macOS.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: HTFExecutor-Windows
          path: dist/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: HTFExecutor-macOS
          path: dist/macos

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows/HTFExecutor_windows.zip
            dist/macos/HTFExecutor-macOS.dmg
